
<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lech App</title>
<style>
body{background:#0b1424;color:white;font-family:sans-serif;text-align:center}
button{padding:15px 20px;margin:10px;border-radius:12px;border:none;font-size:18px;cursor:pointer}
</style>
</head>
<body>

<h1>Vyber sekciu</h1>

<button onclick="load('movies')">🎬 Filmy</button>
<button onclick="load('series')">📺 Seriály</button>

<div id="out"></div>

<script>
const API = "YOUR_WORKER_URL";

async function load(type){
  const res = await fetch(API + "/api/list?type=" + type);
  const data = await res.json();
  document.getElementById('out').innerHTML =
    data.items.map(x => "<p>"+x.title+"</p>").join("");
}
</script>

</body>
</html>
